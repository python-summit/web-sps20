<!doctype html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="{{ '/css/style.css'|url }}">

    <title>{% block title %}Welcome{% endblock %} — Swiss Python Summit</title>
</head>
<body>
    <div class="cover">
        <img src="{{ '/hero.jpg'|url }}" class="img-responsive img-fit-cover" alt="Areal shot of Rapperswil">
    </div>
    <div class="container grid-lg">
        <header class="navbar">
            <section class="navbar-section">
                <img src="{{ '/logo.svg'|url }}" class="logo-small mr-2" alt="Logo">
                <a href="{{ site.root|url }}" class="text-bold mr-2">Swiss Python Summit</a>

                {% for page in site.root.children %}
                <a href="{{ page|url }}" class="btn btn-link">{{ page.title }}</a>
                {% endfor %}
            </section>
        </header>

        <div class="page">
            {% block body %}{% endblock %}
        </div>
    </div>
</body>
